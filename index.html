<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova AI — генератор вопросов</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="logo">
                <div class="logo-icon">✨</div>
                <span class="logo-text">Nova AI</span>
            </div>
            <div class="subtitle">Генерация вопросов для самопроверки</div>
        </div>

        <div class="columns">
            <!-- Левая колонка -->
            <div class="left">
                <h2>📚 Загрузить лекцию</h2>
                <div class="upload" id="uploadArea">
                    <div class="upload-icon">📁</div>
                    <div>Перетащи файл сюда</div>
                    <div>или <span class="link" id="selectFileBtn">нажми для выбора</span></div>
                    <div class="hint">TXT, PDF, DOCX (до 10MB)</div>
                    <input type="file" id="fileInput" accept=".txt,.pdf,.docx" style="display:none">
                    <button class="btn secondary" id="selectFileBtn2">📂 Выбрать файл</button>
                </div>
                <div class="file-info" id="fileInfo" style="display:none">
                    <span id="fileName"></span> (<span id="fileSize"></span>)
                    <button id="removeFileBtn">❌</button>
                </div>
                <div class="or">или</div>
                <textarea id="lectureText" rows="6" placeholder="Вставьте текст лекции... (минимум 500 символов)"></textarea>
                <div class="counter"><span id="charCounter">0</span> / 500</div>
                <button class="btn primary" id="generateBtn" disabled>✨ Сгенерировать вопросы</button>
            </div>

            <!-- Правая колонка -->
            <div class="right">
                <div class="tabs">
                    <button class="tab active" data-tab="questions">❓ Вопросы</button>
                    <button class="tab" data-tab="chat">💬 Чат с ИИ</button>
                </div>
                <div class="tab-content active" id="questionsPanel">
                    <div class="result-header">
                        <h3>📋 Результат</h3>
                        <div class="actions">
                            <button id="copyBtn" title="Копировать">📋</button>
                            <div class="dropdown">
                                <button id="downloadBtn">💾</button>
                                <div class="dropdown-menu">
                                    <button id="downloadPdf">PDF</button>
                                    <button id="downloadDocx">DOCX</button>
                                    <button id="downloadTxt">TXT</button>
                                </div>
                            </div>
                            <button id="clearBtn">🗑️</button>
                        </div>
                    </div>
                    <div class="result" id="resultArea">
                        <div class="placeholder">⬅️ Сгенерируйте вопросы</div>
                    </div>
                </div>
                <div class="tab-content" id="chatPanel">
                    <div class="chat-messages" id="chatMessages">
                        <div class="message bot">
                            <div class="avatar">🤖</div>
                            <div class="bubble">
                                <div class="name">Nova AI</div>
                                <div class="text">Задайте вопрос</div>
                            </div>
                        </div>
                    </div>
                    <div class="chat-input">
                        <input type="text" id="chatInput" placeholder="Напишите сообщение...">
                        <button id="sendBtn">📨</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">Nova AI генерация вопросов для самопроверки by Timm</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
